name: example
seed: 0

# Horizons (in months) whose phrasings are held out for the test split.
# By holding out by *phrasing group* (not by row), we can measure whether
# unseen phrasings collapse onto the same manifold point as their training
# equivalents.
test_phrasing_groups:
  - 1.0
  - 12.0

scenarios:
  savings_plan: "I want to save up for a new laptop. I plan to save over the next {horizon}."
  fitness_goal: "I'm starting a new workout routine and aim to see results within {horizon}."
  career_milestone: "My next career milestone is something I want to reach in {horizon}."
  vacation_planning: "I'm planning a vacation that's coming up in {horizon}."

# phrasing_groups: null  # null/omitted => use DEFAULT_PHRASING_GROUPS
